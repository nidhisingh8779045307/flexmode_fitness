{% extends "base.html" %}
{% block title %}Reset Password - FlexMode{% endblock %}

{% block content %}
<div class="container">
<div class="form-container">

  <h2>Reset Password</h2>
  <p class="subtitle">Enter your registered email and choose a new password.</p>

  <form method="POST">

    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label for="password">New Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Minimum 8 characters"
        minlength="8"
        required
        autocomplete="new-password"
      >
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        placeholder="Repeat your new password"
        minlength="8"
        required
        autocomplete="new-password"
      >
    </div>

    <button type="submit" class="btn btn-primary btn-full">
      Reset Password
    </button>

  </form>

  <div class="form-footer">
    Remembered it? <a href="{{ url_for('login') }}">Back to Login</a>
  </div>

</div>
</div>

<script>
  // Client-side confirm password match check
  const form = document.querySelector('form');
  const password = document.getElementById('password');
  const confirm  = document.getElementById('confirm_password');

  form.addEventListener('submit', function(e) {
    if (password.value !== confirm.value) {
      e.preventDefault();
      confirm.setCustomValidity("Passwords do not match.");
      confirm.reportValidity();
    } else {
      confirm.setCustomValidity("");
    }
  });

  confirm.addEventListener('input', function() {
    if (password.value !== confirm.value) {
      confirm.setCustomValidity("Passwords do not match.");
    } else {
      confirm.setCustomValidity("");
    }
  });
</script>

{% endblock %}
